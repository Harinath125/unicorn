<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Organizational Body Tracking</title>
  <style>
    body {
      background: #0b0b0b;
      color: #00e0c6;
      font-family: "Inter", sans-serif;
      text-align: center;
      margin: 0;
    }
    h1 { margin: 16px; }
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    video, canvas {
      width: 640px;
      height: 480px;
      border: 1px solid #00e0c6;
      border-radius: 6px;
      background: #000;
    }
    #angles {
      font-size: 14px;
      background: #111;
      padding: 12px;
      border-radius: 6px;
      margin-top: 20px;
      width: 480px;
      text-align: left;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <h1>🧍 Organizational-Level Motion Tracking</h1>

  <div class="container">
    <div>
      <video id="video" autoplay playsinline></video>
      <div style="margin-top:8px;">Original Feed</div>
    </div>
    <div>
      <canvas id="output"></canvas>
      <div style="margin-top:8px;">Pose Tracking</div>
    </div>
  </div>

  <div id="angles">Calculating angles...</div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

  <script>
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('output');
    const canvasCtx = canvasElement.getContext('2d');
    const angleDiv = document.getElementById('angles');

    // Initialize Pose
    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 2,             // highest accuracy
      smoothLandmarks: true,
      enableSegmentation: false,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    pose.onResults(onResults);

    function getAngle(a, b, c) {
      // Returns angle ABC in degrees
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return angle.toFixed(1);
    }

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks) {
        const lm = results.poseLandmarks;
        // draw slim lines and tiny dots
        drawConnectors(canvasCtx, lm, POSE_CONNECTIONS, { color: '#00ff88', lineWidth: 1.2 });
        drawLandmarks(canvasCtx, lm, { color: '#ff5555', radius: 2.5 });

        // Example angle computations
        const leftElbow = getAngle(lm[11], lm[13], lm[15]); // shoulder-elbow-wrist
        const rightElbow = getAngle(lm[12], lm[14], lm[16]);
        const leftKnee = getAngle(lm[23], lm[25], lm[27]);
        const rightKnee = getAngle(lm[24], lm[26], lm[28]);

        angleDiv.innerHTML = `
          <b>Joint Angles (°)</b><br>
          Left Elbow: ${leftElbow}°<br>
          Right Elbow: ${rightElbow}°<br>
          Left Knee: ${leftKnee}°<br>
          Right Knee: ${rightKnee}°<br>
        `;

        // Optionally emit data to backend
        // if (socket && socket.connected) {
        //   socket.emit('pose_data', { leftElbow, rightElbow, leftKnee, rightKnee });
        // }
      }
      canvasCtx.restore();
    }

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await pose.send({ image: videoElement });
      },
      width: 640,
      height: 480
    });
    camera.start();
  </script>
</body>
</html>
