<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Therapist Dashboard - UniQuorn</title>
    <meta name="description" content="Therapist dashboard for patient management and treatment planning">
    <meta name="keywords" content="therapist, dashboard, patients, treatment, therapy">

    <!-- React 18 -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Babel to allow JSX in browser -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icons -->
<link href="https://unpkg.com/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <!-- Database Functions -->
    <script>
      window.trickleListObjects = function(objectType) {
        return new Promise((resolve, reject) => {
          try {
            const mockData = {
              patient: Array.from({length: 28}, (_, i) => ({
                objectId: `patient-${String(i + 1).padStart(3, '0')}`,
                objectType: 'patient',
                objectData: {
                  name: `Patient ${i + 1}`,
                  email: `patient${i + 1}@email.com`,
                  clinicId: 'clinic-001',
                  therapistId: 'therapist-001',
                  status: 'active'
                },
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
              }))
            };
            
            setTimeout(() => {
              resolve({ items: mockData[objectType] || [] });
            }, 100);
          } catch (error) {
            console.error('trickleListObjects error:', error);
            resolve({ items: [] });
          }
        });
      };

      window.trickleCreateObject = function(objectType, objectData) {
        return new Promise((resolve) => {
          setTimeout(() => {
            resolve({
              objectId: `${objectType}-${Date.now()}`,
              objectType: objectType,
              objectData: objectData,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            });
          }, 100);
        });
      };

      window.trickleDeleteObject = function(objectType, objectId) {
        return new Promise((resolve) => {
          setTimeout(() => {
            resolve(true);
          }, 100);
        });
      };

      window.trickleUpdateObject = function(objectType, objectId, objectData) {
        return new Promise((resolve) => {
          setTimeout(() => {
            resolve({
              objectId: objectId,
              objectType: objectType,
              objectData: objectData,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            });
          }, 100);
        });
      };

      window.trickleGetObject = function(objectType, objectId) {
        return new Promise((resolve) => {
          setTimeout(() => {
            resolve({
              objectId: objectId,
              objectType: objectType,
              objectData: { name: 'Sample Patient', email: 'patient@example.com', status: 'active' },
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            });
          }, 100);
        });
      };
    </script>

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #2563eb;
            --secondary-color: #f1f5f9;
            --accent-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
        }
    }

    @layer base {
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        * {
            scroll-behavior: smooth;
        }
    }

    @layer components {
        .btn {
            @apply px-4 py-2 rounded-lg font-medium transition-all duration-300 flex items-center gap-2 relative overflow-hidden;
        }
        
        .btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover:before {
            left: 100%;
        }
        
        .btn-primary {
            @apply bg-[var(--primary-color)] text-white shadow-lg hover:shadow-xl transform hover:-translate-y-1;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
        }
        
        .btn-secondary {
            @apply bg-[var(--secondary-color)] text-[var(--text-primary)] hover:bg-gray-200 transform hover:-translate-y-1;
        }
        
        .card {
            @apply bg-white rounded-xl shadow-sm border border-[var(--border-color)] p-6 transition-all duration-500;
            animation: slideInUp 0.6s ease-out;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .stat-card {
            @apply bg-white rounded-xl shadow-sm border border-[var(--border-color)] p-6 transition-all duration-500 cursor-pointer;
            animation: slideInUp 0.6s ease-out;
        }
        
        .stat-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            border-color: var(--primary-color);
        }
        
        .sidebar {
            @apply bg-white shadow-lg border-r border-[var(--border-color)] h-screen sticky top-0 transition-all duration-300;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes bounceIn {
            0%, 20%, 40%, 60%, 80%, 100% {
                transition-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1);
            }
            0% {
                opacity: 0;
                transform: scale3d(0.3, 0.3, 0.3);
            }
            20% {
                transform: scale3d(1.1, 1.1, 1.1);
            }
            40% {
                transform: scale3d(0.9, 0.9, 0.9);
            }
            60% {
                opacity: 1;
                transform: scale3d(1.03, 1.03, 1.03);
            }
            80% {
                transform: scale3d(0.97, 0.97, 0.97);
            }
            100% {
                opacity: 1;
                transform: scale3d(1, 1, 1);
            }
        }
        
        .animate-fade-in-right {
            animation: fadeInRight 0.6s ease-out;
        }
        
        .animate-bounce-in {
            animation: bounceIn 0.8s ease-out;
        }
    }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel" src="components/DashboardHeader.js"></script>
    <script type="text/babel" src="components/Sidebar.js"></script>

    <script type="text/babel" src="components/NewMessageModal.js"></script>
    <script type="text/babel" src="components/ChatWindow.js"></script>
    <script type="text/babel" src="utils/auth.js"></script>
    <script type="text/babel" src="therapist-app.js"></script>
</body>
</html>
