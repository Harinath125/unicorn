    <!-- Database Functions -->
    <script>
      window.trickleListObjects = function(objectType) {
        return new Promise((resolve, reject) => {
          try {
            setTimeout(() => {
              resolve({ items: [] });
            }, 100);
          } catch (error) {
            console.error('trickleListObjects error:', error);
            resolve({ items: [] });
          }
        });
      };

      window.trickleCreateObject = function(objectType, objectData) {
        return new Promise((resolve) => {
          setTimeout(() => {
            resolve({
              objectId: `${objectType}-${Date.now()}`,
              objectType: objectType,
              objectData: objectData,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            });
          }, 100);
        });
      };

      window.trickleDeleteObject = function(objectType, objectId) {
        return new Promise((resolve) => {
          setTimeout(() => {
            resolve(true);
          }, 100);
        });
      };

      window.trickleUpdateObject = function(objectType, objectId, objectData) {
        return new Promise((resolve) => {
          setTimeout(() => {
            resolve({
              objectId: objectId,
              objectType: objectType,
              objectData: objectData,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            });
          }, 100);
        });
      };

      window.trickleGetObject = function(objectType, objectId) {
        return new Promise((resolve) => {
          setTimeout(() => {
            resolve({
              objectId: objectId,
              objectType: objectType,
              objectData: {},
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            });
          }, 100);
        });
      };
    </script>

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #2563eb;
            --secondary-color: #f1f5f9;
            --accent-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
        }
    }

    @layer base {
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        * {
            scroll-behavior: smooth;
        }
    }

    @layer components {
        .btn {
            @apply px-4 py-2 rounded-lg font-medium transition-all duration-300 flex items-center gap-2 relative overflow-hidden;
        }
        
        .btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover:before {
            left: 100%;
        }
        
        .btn-primary {
            @apply bg-[var(--primary-color)] text-white shadow-lg hover:shadow-xl transform hover:-translate-y-1;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
        }
        
        .btn-secondary {
            @apply bg-[var(--secondary-color)] text-[var(--text-primary)] hover:bg-gray-200 transform hover:-translate-y-1;
        }
        
        .card {
            @apply bg-white rounded-xl shadow-sm border border-[var(--border-color)] p-6 transition-all duration-500;
            animation: slideInUp 0.6s ease-out;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .stat-card {
            @apply bg-white rounded-xl shadow-sm border border-[var(--border-color)] p-6 transition-all duration-500 cursor-pointer;
            animation: slideInUp 0.6s ease-out;
        }
        
        .stat-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            border-color: var(--primary-color);
        }
        
        .sidebar {
            @apply bg-white shadow-lg border-r border-[var(--border-color)] h-screen sticky top-0 transition-all duration-300;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes progressFill {
            from {
                width: 0%;
            }
        }
        
        @keyframes heartbeat {
            0% {
                transform: scale(1);
            }
            14% {
                transform: scale(1.3);
            }
            28% {
                transform: scale(1);
            }
            42% {
                transform: scale(1.3);
            }
            70% {
                transform: scale(1);
            }
        }
        
        .progress-bar {
            animation: progressFill 1.5s ease-out;
        }
        
        .heart-beat {
            animation: heartbeat 2s ease-in-out infinite;
        }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
    }
